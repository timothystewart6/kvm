server {
    listen 80;
    server_name kvm-app.technotim.live;

    # Serve the Vite app from the `dist` folder
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html =404;
    }

    # Proxy API requests to the backend API
    location /oidc/google {
        proxy_pass https://kvm-api.technotim.live;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Allow CORS for API requests (if needed)
    location /api/ {
        proxy_pass https://kvm-api.technotim.live;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type';
    }
}

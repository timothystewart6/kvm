worker_processes auto;

events {}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name kvm-app.technotim.live;

        root /var/www;
        index index.html;

        location /assets/ {
            try_files $uri $uri/;
        }
        location / {
            try_files $uri /index.html;
        }
    }
}
worker_processes auto;

events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name kvm-app.technotim.live;

        root /var/www;
        index index.html;

        location / {
            try_files $uri /index.html;
        }
    }
}